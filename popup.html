<!DOCTYPE html>
<html lang="en">
<head>
  <title>googlePanicImages - Settings</title>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <h1>googlePanicImages options</h1>
  <div class="border">
    <p class="optionsNote">Note: Please reload the Google image tab in order for settings to be applied!</p>
    <ul class="options border">
      <li>
        <label class="option-label" for="show-image-size-on-all">
          Show image resolution on all images?
        </label>
        <input type="checkbox" id="show-image-size-on-all" name="show-image-size-on-all">
      </li>
      <li>
        <label class="option-label" for="show-image-size-underneath">
          Show image resolution below images?
        </label>
        <input type="checkbox" id="show-image-size-on-underneath" name="show-image-size-on-underneath">
      </li>
    </ul>
  </div>

  <a class="linkNote" href="https://github.com/jrie/googlePanicImage">googlePanicImage source code</a>
  
  <script src="popup.js"></script>
</body>
</html>
